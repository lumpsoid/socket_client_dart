name: socket_network_system
description: >
  Production-ready WebSocket networking system for Dart & Flutter.
  Features automatic reconnection, heartbeat keep-alive, typed messaging,
  middleware pipeline, channel pub/sub, offline queueing, and health monitoring.
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

# No external dependencies — pure Dart implementation.
# Optional integrations:
#   connectivity_plus: ^6.0.0  # For Flutter network monitoring
#   crypto: ^3.0.0             # For message encryption middleware

dev_dependencies:
  test: ^1.25.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  lints: ^4.0.0
