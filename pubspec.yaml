name: socket_client
description: >
  Production-ready WebSocket networking system for Dart & Flutter.
  Features automatic reconnection, heartbeat keep-alive, typed messaging,
  middleware pipeline, channel pub/sub, offline queueing, and health monitoring.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.11.0

dev_dependencies:
  mocktail: ^1.0.5
  test: ^1.31.0
  very_good_analysis: ^10.2.0
